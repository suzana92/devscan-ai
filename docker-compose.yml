services:
  devscan:
    build: .
    container_name: devscan-app
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=qwen2.5-coder:7b
      - OLLAMA_TAGS_TIMEOUT=30
      - OLLAMA_GEN_TIMEOUT=300
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped